<!DOCTYPE html>
<html>
<head>
    <title>Checkout</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <h1>Checkout</h1>

    <form method="post">
        {% csrf_token %}

        <div class="mb-3">
            <label>Name</label>
            <input type="text"
                   name="name"
                   class="form-control"
                   required>
        </div>

        <div class="mb-3">
            <label>Address</label>
            <textarea name="address"
                      class="form-control"
                      required></textarea>
        </div>

        <div class="mb-3">
            <label>Phone Number</label>
            <input type="text"
                   name="phone"
                   class="form-control"
                   required>
        </div>

        <button type="submit"
                class="btn btn-success">
            Place Order
        </button>

    </form>

</div>

</body>
</html>
